<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Beranda — Sistem Absensi</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />

  <style>
    /* ── STAT CARDS ── */
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .stat-card {
      background: #fff; border-radius: 12px; padding: 14px 10px;
      text-align: center; border: 1px solid #edf0f7;
      box-shadow: 0 2px 8px rgba(0,0,0,.04);
    }
    .stat-num { font-size: 24px; font-weight: 700; color: #1a2a4a; }
    .stat-lbl { font-size: 11px; color: #9aa5b4; font-weight: 600; margin-top: 2px; }
    .stat-card.hadir .stat-num { color: var(--success); }
    .stat-card.absen .stat-num { color: var(--danger); }

    /* ── SEARCH ── */
    .search-wrap { position: relative; margin-bottom: 14px; }
    .search-wrap i { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: #aab0bb; font-size: 16px; }
    .search-input {
      width: 100%; padding: 10px 14px 10px 38px;
      border-radius: 10px; border: 1.5px solid #e2e8f0;
      font-size: 14px; font-family: 'Plus Jakarta Sans', sans-serif;
      outline: none; transition: border-color .15s;
    }
    .search-input:focus { border-color: var(--primary); }

    /* ── TABLE ── */
    .tbl-wrap { overflow-x: auto; border-radius: 12px; }
    .mhs-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 320px; }
    .mhs-table thead th {
      background: var(--primary); color: #fff;
      padding: 10px; font-weight: 600; text-align: left; font-size: 12px;
    }
    .mhs-table thead th:first-child { border-radius: 10px 0 0 0; }
    .mhs-table thead th:last-child  { border-radius: 0 10px 0 0; }
    .mhs-table tbody tr { border-bottom: 1px solid #f0f4f9; transition: background .1s; }
    .mhs-table tbody tr:last-child { border-bottom: none; }
    .mhs-table tbody tr:hover { background: #f8faff; }
    .mhs-table td { padding: 9px 10px; vertical-align: middle; }

    .badge-hadir { background: #d1fae5; color: #065f46; font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 600; }
    .badge-absen { background: #fee2e2; color: #991b1b; font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 600; }

    .btn-tbl-edit {
      background: #e0f2fe; color: #0369a1; border: none;
      border-radius: 7px; padding: 5px 10px; font-size: 11px; font-weight: 600;
      cursor: pointer; transition: background .12s; font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .btn-tbl-edit:hover { background: #bae6fd; }
    .btn-tbl-del {
      background: #fee2e2; color: #991b1b; border: none;
      border-radius: 7px; padding: 5px 10px; font-size: 11px; font-weight: 600;
      cursor: pointer; transition: background .12s; font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .btn-tbl-del:hover { background: #fecaca; }

    /* ── TAMBAH BUTTON ── */
    .btn-tambah {
      background: var(--primary); color: #fff; border: none;
      border-radius: 12px; padding: 13px; font-size: 14px; font-weight: 600;
      width: 100%; cursor: pointer; margin-top: 4px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background .15s; font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .btn-tambah:hover { background: var(--primary-dark); }
  </style>
</head>
<body>

<div class="phone-shell">
  <!-- Status Bar -->
  <div class="status-bar">
    <span id="clock">09:41</span>
    <span><i class="bi bi-wifi"></i> <i class="bi bi-battery-half"></i></span>
  </div>

  <!-- Header -->
  <div class="top-header">
    <i class="bi bi-house-fill"></i> Beranda
  </div>

  <!-- Body -->
  <div class="page-body">

    <!-- Stat Cards -->
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-num" id="stat-total">0</div>
        <div class="stat-lbl">Total</div>
      </div>
      <div class="stat-card hadir">
        <div class="stat-num" id="stat-hadir">0</div>
        <div class="stat-lbl">Hadir</div>
      </div>
      <div class="stat-card absen">
        <div class="stat-num" id="stat-absen">0</div>
        <div class="stat-lbl">Absen</div>
      </div>
    </div>

    <!-- Table Card -->
    <div class="card-box">
      <div class="card-box-title">Data Mahasiswa</div>
      <div class="search-wrap">
        <i class="bi bi-search"></i>
        <input type="text" class="search-input" id="search-mhs"
               placeholder="Cari NIM atau nama..." oninput="filterMhs()">
      </div>
      <div class="tbl-wrap">
        <table class="mhs-table">
          <thead>
            <tr>
              <th>NIM</th>
              <th>Nama</th>
              <th>Status</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="tbl-body"></tbody>
        </table>
      </div>
      <button class="btn-tambah mt-3" onclick="openAddModal()">
        <i class="bi bi-person-plus-fill"></i> Tambah Mahasiswa
      </button>
    </div>

  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <button class="nav-item active"><i class="bi bi-house-fill"></i>Beranda</button>
    <button class="nav-item" onclick="window.location.href='scan.html'"><i class="bi bi-qr-code-scan"></i>Scan QR</button>
    <button class="nav-item" onclick="window.location.href='profil.html'"><i class="bi bi-person-circle"></i>Profil</button>
  </div>
</div>

<!-- Modal Tambah / Edit -->
<div class="modal-overlay" id="modal-overlay" onclick="onOverlayClick(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Tambah Mahasiswa</div>
    <div class="mb-3">
      <label class="form-label">NIM</label>
      <input type="text" class="form-control" id="m-nim" placeholder="Contoh: 2024005">
    </div>
    <div class="mb-3">
      <label class="form-label">Nama Lengkap</label>
      <input type="text" class="form-control" id="m-nama" placeholder="Contoh: Rizky Pratama">
    </div>
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" class="form-control" id="m-username" placeholder="Contoh: rizky05">
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" class="form-control" id="m-password" placeholder="Masukkan password">
    </div>
    <div class="mb-4">
      <label class="form-label">Ulangi Password</label>
      <input type="password" class="form-control" id="m-repassword" placeholder="Ulangi password">
    </div>
    <div class="d-flex gap-2">
      <button class="btn-cancel-m" onclick="closeModal()">Batal</button>
      <button class="btn-save" onclick="saveModal()">Simpan</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-wrap" id="toast-wrap"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script>
  startClock();
  renderTable();
  updateStats();

  /* ── RENDER TABLE ── */
  function renderTable(data) {
    if (!data) data = getFiltered();
    const tbody = document.getElementById('tbl-body');
    if (data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:20px;color:#9aa5b4;font-size:13px;">Tidak ada data ditemukan.</td></tr>`;
      return;
    }
    tbody.innerHTML = data.map(m => {
      const i = mahasiswa.indexOf(m);
      return `<tr>
        <td style="font-weight:600;color:#1a2a4a;">${m.nim}</td>
        <td>${m.nama}</td>
        <td><span class="${m.status === 'hadir' ? 'badge-hadir' : 'badge-absen'}">${m.status === 'hadir' ? 'Hadir' : 'Absen'}</span></td>
        <td style="white-space:nowrap;">
          <button class="btn-tbl-edit me-1" onclick="openEdit(${i})"><i class="bi bi-pencil-fill"></i></button>
          <button class="btn-tbl-del"       onclick="hapus(${i})"><i class="bi bi-trash-fill"></i></button>
        </td>
      </tr>`;
    }).join('');
    updateStats();
  }

  function getFiltered() {
    const q = (document.getElementById('search-mhs').value || '').toLowerCase();
    return q ? mahasiswa.filter(m => m.nim.toLowerCase().includes(q) || m.nama.toLowerCase().includes(q)) : [...mahasiswa];
  }
  function filterMhs() { renderTable(getFiltered()); }

  /* ── MODAL ── */
  function openAddModal() {
    editIdx = -1;
    document.getElementById('modal-title').textContent = 'Tambah Mahasiswa';
    ['m-nim','m-nama','m-username','m-password','m-repassword'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('modal-overlay').classList.add('open');
  }

  function openEdit(idx) {
    editIdx = idx;
    const m = mahasiswa[idx];
    document.getElementById('modal-title').textContent = 'Edit Data Mahasiswa';
    document.getElementById('m-nim').value      = m.nim;
    document.getElementById('m-nama').value     = m.nama;
    document.getElementById('m-username').value = m.username;
    document.getElementById('m-password').value = '';
    document.getElementById('m-repassword').value = '';
    document.getElementById('modal-overlay').classList.add('open');
  }

  function hapus(idx) {
    if (!confirm(`Hapus data ${mahasiswa[idx].nama}?`)) return;
    const nama = mahasiswa[idx].nama;
    mahasiswa.splice(idx, 1);
    showToast(`Data ${nama} berhasil dihapus.`, 'danger');
    renderTable();
  }
</script>
</body>
</html>
