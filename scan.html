<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Scan QR — Sistem Absensi</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />

  <style>
    /* ── QR FRAME ── */
    .qr-outer {
      display: flex; flex-direction: column;
      align-items: center; padding: 24px 16px;
    }
    .qr-instruction {
      font-size: 13px; color: #7a8a9e;
      text-align: center; margin-bottom: 20px; line-height: 1.6;
    }
    .qr-frame-wrap {
      width: 240px; height: 240px; position: relative;
      border-radius: 20px; overflow: hidden;
      background: #0a0a0a;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
      margin-bottom: 24px;
    }
    .qr-frame-wrap video { width: 100%; height: 100%; object-fit: cover; }
    .qr-placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #555; gap: 8px; font-size: 13px;
    }
    .qr-placeholder i { font-size: 48px; color: #333; }

    /* Corner decorations */
    .qr-corner { position: absolute; width: 28px; height: 28px; z-index: 5; }
    .qr-corner.tl { top: 10px; left: 10px; border-top: 3px solid var(--primary); border-left: 3px solid var(--primary); border-radius: 6px 0 0 0; }
    .qr-corner.tr { top: 10px; right: 10px; border-top: 3px solid var(--primary); border-right: 3px solid var(--primary); border-radius: 0 6px 0 0; }
    .qr-corner.bl { bottom: 10px; left: 10px; border-bottom: 3px solid var(--primary); border-left: 3px solid var(--primary); border-radius: 0 0 0 6px; }
    .qr-corner.br { bottom: 10px; right: 10px; border-bottom: 3px solid var(--primary); border-right: 3px solid var(--primary); border-radius: 0 0 6px 0; }

    /* Scan line animation */
    .scan-line {
      position: absolute; left: 10%; width: 80%; height: 2px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      top: 10%; z-index: 6;
      animation: scanAnim 2s ease-in-out infinite;
    }
    @keyframes scanAnim { 0%,100% { top: 10%; } 50% { top: 85%; } }

    /* ── BUTTONS ── */
    .btn-cam {
      background: var(--primary); color: #fff; border: none;
      border-radius: 12px; padding: 13px 28px; font-size: 14px; font-weight: 600;
      width: 100%; max-width: 280px; cursor: pointer; margin-bottom: 10px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background .15s; font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .btn-cam:hover { background: var(--primary-dark); }

    .btn-sim {
      background: #f1f5f9; color: #4a5568; border: none;
      border-radius: 12px; padding: 12px 28px; font-size: 14px; font-weight: 600;
      width: 100%; max-width: 280px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background .15s; font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .btn-sim:hover { background: #e2e8f0; }

    /* ── SCAN LOG ── */
    .scan-log-item {
      padding: 9px 0; border-bottom: 1px solid #f0f4f9;
      font-size: 12px; color: #4a5568;
      display: flex; align-items: center; gap: 8px;
    }
    .scan-log-item:last-child { border-bottom: none; }
    .scan-log-item i { color: var(--success); font-size: 14px; }
  </style>
</head>
<body>

<div class="phone-shell">
  <!-- Status Bar -->
  <div class="status-bar">
    <span id="clock">09:41</span>
    <span><i class="bi bi-wifi"></i> <i class="bi bi-battery-half"></i></span>
  </div>

  <!-- Header -->
  <div class="top-header">
    <i class="bi bi-qr-code-scan"></i> Scan QR Code
  </div>

  <!-- Body -->
  <div class="page-body">
    <div class="qr-outer">

      <p class="qr-instruction">
        Arahkan kamera ke QR Code mahasiswa.<br>
        Sistem akan otomatis mencatat kehadiran.
      </p>

      <!-- QR Frame -->
      <div class="qr-frame-wrap" id="qr-frame-wrap">
        <div class="qr-corner tl"></div>
        <div class="qr-corner tr"></div>
        <div class="qr-corner bl"></div>
        <div class="qr-corner br"></div>
        <div class="scan-line"></div>
        <div class="qr-placeholder" id="qr-placeholder">
          <i class="bi bi-camera-video-off"></i>
          <span>Kamera belum aktif</span>
        </div>
        <video id="qr-video" autoplay playsinline
               style="display:none;width:100%;height:100%;object-fit:cover;"></video>
      </div>

      <!-- Buttons -->
      <button class="btn-cam" onclick="activateCamera()">
        <i class="bi bi-camera-fill"></i> Aktifkan Kamera
      </button>
      <button class="btn-sim" onclick="simulateScan()">
        <i class="bi bi-lightning-fill"></i> Simulasi Scan
      </button>

    </div>

    <!-- Log Card -->
    <div class="card-box mt-0">
      <div class="card-box-title">Log Absensi Hari Ini</div>
      <div id="scan-log">
        <div style="font-size:13px;color:#9aa5b4;text-align:center;padding:12px 0;">
          <i class="bi bi-clock" style="font-size:24px;display:block;margin-bottom:6px;"></i>
          Belum ada data scan.
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <button class="nav-item" onclick="window.location.href='beranda.html'"><i class="bi bi-house-fill"></i>Beranda</button>
    <button class="nav-item active"><i class="bi bi-qr-code-scan"></i>Scan QR</button>
    <button class="nav-item" onclick="window.location.href='profil.html'"><i class="bi bi-person-circle"></i>Profil</button>
  </div>
</div>

<!-- Toast -->
<div class="toast-wrap" id="toast-wrap"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script>
  startClock();

  /* ── CAMERA ── */
  function activateCamera() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      showToast('Kamera tidak didukung di browser ini.', 'danger');
      return;
    }
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
      .then(stream => {
        camStream = stream;
        const video = document.getElementById('qr-video');
        video.srcObject = stream;
        video.style.display = 'block';
        document.getElementById('qr-placeholder').style.display = 'none';
        showToast('Kamera berhasil diaktifkan!', 'success');
      })
      .catch(() => {
        showToast('Akses kamera ditolak. Gunakan tombol Simulasi Scan.', 'danger');
      });
  }

  /* ── SIMULATE SCAN ── */
  function simulateScan() {
    const absent = mahasiswa.filter(m => m.status === 'absen');
    const target = absent.length > 0
      ? absent[Math.floor(Math.random() * absent.length)]
      : mahasiswa[Math.floor(Math.random() * mahasiswa.length)];

    target.status = 'hadir';

    const now  = new Date();
    const time = String(now.getHours()).padStart(2,'0') + ':'
               + String(now.getMinutes()).padStart(2,'0') + ':'
               + String(now.getSeconds()).padStart(2,'0');

    scanLogs.unshift({ nama: target.nama, nim: target.nim, time });
    renderScanLog();
    showToast(`Absensi ${target.nama} berhasil dicatat!`, 'success');
  }

  /* ── RENDER LOG ── */
  function renderScanLog() {
    const el = document.getElementById('scan-log');
    if (scanLogs.length === 0) {
      el.innerHTML = '<div style="font-size:13px;color:#9aa5b4;text-align:center;padding:12px 0;">Belum ada data scan.</div>';
      return;
    }
    el.innerHTML = scanLogs.slice(0, 8).map(l => `
      <div class="scan-log-item">
        <i class="bi bi-check-circle-fill"></i>
        <div>
          <strong>${l.nama}</strong>
          <span style="color:#9aa5b4;"> ${l.nim}</span><br>
          <span style="color:#9aa5b4;">${l.time}</span>
        </div>
      </div>`).join('');
  }
</script>
</body>
</html>
